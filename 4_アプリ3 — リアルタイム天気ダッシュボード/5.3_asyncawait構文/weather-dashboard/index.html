<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>リアルタイム天気ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>☀️ リアルタイム天気ダッシュボード</h1>

    <div class="search-box">

      <input
        type="text"
        id="cityInput"
        placeholder="都市名を入力"
        value="Tokyo"
      >

      <button id="searchBtn">
        天気を取得
      </button>

    </div>

    <div class="weather-card">

      <h2 id="cityName">
        Tokyo
      </h2>

      <p id="weatherText">
        晴れ
      </p>

      <p id="temp">
        --°C
      </p>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
