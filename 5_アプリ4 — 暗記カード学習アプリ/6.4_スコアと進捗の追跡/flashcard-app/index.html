<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>暗記カード学習アプリ</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="app">

    <!-- ヘッダー -->
    <header class="header">

      <h1>
        📘 暗記カード学習アプリ
      </h1>

      <!-- カウンター -->
      <p
        id="cardCounter"
        class="counter"
      >
        1 / 10
      </p>

      <!-- プログレスバー -->
      <div class="progress-container">

        <div
          id="progressBar"
          class="progress-bar"
        ></div>

      </div>

      <!-- パーセント -->
      <p
        id="progressText"
        class="progress-text"
      >
        0%
      </p>

      <!-- スコア -->
      <div class="score-board">

        <p>
          ✅ 正解:
          <span id="scoreCorrect">0</span>
        </p>

        <p>
          ❌ もう一度:
          <span id="scoreIncorrect">0</span>
        </p>

      </div>

    </header>


    <!-- カード -->
    <div
      id="flashcard"
      class="flashcard"
    >

      <div
        id="cardInner"
        class="card-inner"
      >

        <!-- 表 -->
        <div class="card-front">

          <span
            id="cardCategory"
            class="category-tag"
          >
            動詞
          </span>

          <h2 id="cardFront">
            implement
          </h2>

        </div>

        <!-- 裏 -->
        <div class="card-back">

          <h3 id="cardBack">
            実装する
          </h3>

          <p id="cardExample">
            We need to implement this feature.
          </p>

        </div>

      </div>

    </div>


    <!-- 操作ボタン -->
    <div class="controls">

      <button id="prevBtn">
        ◀ 前へ
      </button>

      <button id="flipBtn">
        🔄 めくる
      </button>

      <button id="nextBtn">
        次へ ▶
      </button>

    </div>


    <!-- 判定ボタン -->
    <div class="answer-buttons">

      <button
        id="correctBtn"
        class="correct-btn"
      >
        ✅ わかった
      </button>

      <button
        id="incorrectBtn"
        class="incorrect-btn"
      >
        ❌ もう一度
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
