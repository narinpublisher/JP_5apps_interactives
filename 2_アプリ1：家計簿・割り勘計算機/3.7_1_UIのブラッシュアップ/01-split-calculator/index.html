<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>家計簿・割り勘計算機</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>💰 割り勘計算機</h1>

    <!-- 入力フォーム -->
    <section class="calculator">

      <div class="input-group">
        <label for="total">
          合計金額（円）
        </label>

        <input
          type="number"
          id="total"
          placeholder="例：5000"
          min="0"
        >
      </div>

      <div class="input-group">
        <label for="people">
          人数（人）
        </label>

        <input
          type="number"
          id="people"
          placeholder="例：3"
          min="1"
        >
      </div>

      <button id="calcBtn">
        計算する
      </button>

    </section>


    <!-- 計算結果 -->
    <section
      class="result"
      id="resultSection"
    >

      <p class="result-label">
        1人あたり
      </p>

      <p
        class="result-amount"
        id="resultAmount"
      >
        ——
      </p>

      <p
        class="result-tax"
        id="resultTax"
      ></p>

      <p
        class="error-msg"
        id="errorMsg"
      ></p>

    </section>


    <!-- 支出リスト -->
    <section class="expense-section">

      <h2>支出リスト</h2>

      <div class="add-expense">

        <input
          type="text"
          id="expenseName"
          placeholder="項目名（例：ランチ）"
        >

        <input
          type="number"
          id="expenseAmount"
          placeholder="金額"
        >

        <select id="expenseCategory">

          <option value="食費">
            食費
          </option>

          <option value="交通費">
            交通費
          </option>

          <option value="娯楽費">
            娯楽費
          </option>

          <option value="その他">
            その他
          </option>

        </select>

        <button id="addBtn">
          追加
        </button>

      </div>

      <ul id="expenseList">

        <li>
          食費：3000円
        </li>

        <li>
          交通費：2000円
        </li>

      </ul>

    </section>

  </div>

  <script src="app.js"></script>

</body>
</html>
