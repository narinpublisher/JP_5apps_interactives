<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    リアルタイム天気ダッシュボード
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="container">

    <h1>
      ☀️ リアルタイム天気ダッシュボード
    </h1>

    <!-- 検索フォーム -->
    <div class="search-box">

      <input
        type="text"
        id="cityInput"
        placeholder="都市名を入力"
        value="Tokyo"
      />

      <button id="searchBtn">
        検索
      </button>

    </div>

    <!-- エラーメッセージ -->
    <p id="errorMsg"></p>

    <!-- ローディング -->
    <div id="spinner" class="hidden">
      読み込み中...
    </div>

    <!-- 天気カード -->
    <div
      class="weather-card"
      id="weatherCard"
    >

      <h2 id="cityName">
        Tokyo, JP
      </h2>

      <img
        id="weatherIcon"
        src="https://openweathermap.org/img/wn/01d@2x.png"
        alt="天気アイコン"
      />

      <p id="temperature">
        --°C
      </p>

      <p id="description">
        --
      </p>

      <div class="details-grid">

        <div class="detail-box">
          <span id="feelsLike">
            体感 --
          </span>
        </div>

        <div class="detail-box">
          <span id="humidity">
            湿度 --
          </span>
        </div>

        <div class="detail-box">
          <span id="windSpeed">
            風速 --
          </span>
        </div>

        <div class="detail-box">
          <span id="tempRange">
            最高 -- / 最低 --
          </span>
        </div>

      </div>

    </div>

    <!-- 非同期ログ -->
    <div class="log-panel">

      <h3>
        非同期ログ
      </h3>

      <ul id="logList"></ul>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
