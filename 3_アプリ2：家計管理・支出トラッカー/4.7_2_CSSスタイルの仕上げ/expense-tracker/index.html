<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>家計管理・支出トラッカー</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>

<body>

  <div class="container">

    <!-- タイトル -->
    <h1>💰 家計管理・支出トラッカー</h1>


    <!-- =========================
         入力フォーム
    ========================== -->

    <section class="card">

      <label for="expenseName">
        項目名
      </label>

      <input
        type="text"
        id="expenseName"
        placeholder="例：ランチ"
      />


      <label for="expenseAmount">
        金額
      </label>

      <input
        type="number"
        id="expenseAmount"
        placeholder="例：1200"
      />


      <label for="expenseCategory">
        カテゴリ
      </label>

      <select id="expenseCategory">
        <option value="食費">食費</option>
        <option value="交通費">交通費</option>
        <option value="娯楽費">娯楽費</option>
        <option value="その他">その他</option>
      </select>


      <label for="expenseDate">
        日付
      </label>

      <input
        type="date"
        id="expenseDate"
      />


      <button id="addBtn">
        追加する
      </button>

    </section>


    <!-- =========================
         フィルター
    ========================== -->

    <div class="filter-bar">

      <button
        class="filter-btn"
        data-category="すべて"
      >
        すべて
      </button>

      <button
        class="filter-btn"
        data-category="食費"
      >
        食費
      </button>

      <button
        class="filter-btn"
        data-category="交通費"
      >
        交通費
      </button>

      <button
        class="filter-btn"
        data-category="娯楽費"
      >
        娯楽費
      </button>

      <button
        class="filter-btn"
        data-category="その他"
      >
        その他
      </button>

    </div>


    <!-- =========================
         メインレイアウト
    ========================== -->

    <div class="main-grid">

      <!-- 左：支出リスト -->
      <section class="card">

        <h2>
             支出一覧
             <span id="listCount">（0件）</span>
        </h2>

        <ul id="expenseList"></ul>

      </section>


      <!-- 右：集計 -->
      <section class="card">

        <h2>月間合計</h2>

        <p
          class="monthly-total"
          id="monthlyTotal"
        >
          0円
        </p>


        <div id="categoryBars">

          <p class="no-data">
            データがありません
          </p>

        </div>

      </section>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
