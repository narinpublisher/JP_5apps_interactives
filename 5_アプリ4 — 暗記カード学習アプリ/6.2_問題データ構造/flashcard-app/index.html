<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>暗記カード学習アプリ</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>📘 暗記カード学習アプリ</h1>

    <!-- 進捗 -->
    <div class="progress">
      <p>
        カード:
        <span id="cardNum">1</span>
        /
        <span id="totalCards">0</span>
      </p>

      <p>
        正解:
        <span id="correctCount">0</span>
      </p>

      <p>
        不正解:
        <span id="incorrectCount">0</span>
      </p>
    </div>

    <!-- カード -->
    <div class="card" id="card">

      <div class="card-inner" id="cardInner">

        <div class="card-front" id="cardFront">
          Question
        </div>

        <div class="card-back" id="cardBack">
          Answer
        </div>

      </div>

    </div>

    <!-- ボタン -->
    <div class="buttons">

      <button id="flipBtn">
        回答を見る
      </button>

      <button id="correctBtn">
        正解
      </button>

      <button id="incorrectBtn">
        不正解
      </button>

      <button id="nextBtn">
        次へ
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
